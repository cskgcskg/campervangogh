<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0b">

    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="Logo/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="Logo/favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="Logo/apple-touch-icon.png">

    <title>Photo Gallery — Vincent VW T6.1 Campervan | Camper Van Gogh</title>
    <meta name="description" content="Browse the full photo gallery of Vincent, our 2022 VW T6.1 campervan. Interior conversion details, exterior shots, and on-the-road photography from Scotland and across the UK.">
    <link rel="canonical" href="https://campervangogh.com/gallery.html">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Camper Van Gogh">
    <meta property="og:locale" content="en_GB">
    <meta property="og:url" content="https://campervangogh.com/gallery.html">
    <meta property="og:title" content="Photo Gallery — Vincent VW T6.1 Campervan">
    <meta property="og:description" content="Interior and exterior photography of our hand-converted 2022 VW T6.1 campervan, including Scotland road trip shots.">
    <meta property="og:image" content="https://campervangogh.com/gallery/exterior/scotland-15-1920.jpg">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Photo Gallery — Vincent VW T6.1 Campervan">
    <meta name="twitter:description" content="Browse interior and exterior photos of our luxury Hampshire-based VW T6.1 campervan.">
    <meta name="twitter:image" content="https://campervangogh.com/gallery/exterior/scotland-15-1920.jpg">

    <meta name="robots" content="index, follow, max-image-preview:large">

    <!-- Structured Data: Breadcrumb + ImageGallery -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "BreadcrumbList",
          "itemListElement": [
            { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://campervangogh.com/" },
            { "@type": "ListItem", "position": 2, "name": "Gallery", "item": "https://campervangogh.com/gallery.html" }
          ]
        },
        {
          "@type": "ImageGallery",
          "name": "Camper Van Gogh — Photo Gallery",
          "description": "Interior and exterior photography of Vincent, a 2022 VW T6.1 campervan based in Hampshire, UK.",
          "url": "https://campervangogh.com/gallery.html",
          "publisher": { "@type": "Organization", "name": "Camper Van Gogh" }
        }
      ]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">

    <style>
        /* ── Gallery page ── */

        .page-hero {
            position: relative;
            padding: calc(var(--header-h) + clamp(48px, 9vw, 88px)) var(--inline-pad) clamp(28px, 4vw, 44px);
            text-align: center;
            overflow: hidden;
        }
        .page-hero::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: clamp(360px, 60vw, 720px);
            height: clamp(360px, 60vw, 720px);
            background: radial-gradient(circle, var(--gold-08) 0%, transparent 65%);
            pointer-events: none;
        }
        .page-hero__inner {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--s-4);
        }
        .page-hero h1 {
            font-style: italic;
            font-size: clamp(3rem, 9vw, 5.5rem);
            line-height: 0.95;
        }
        .page-hero__eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.32em;
            text-transform: uppercase;
            color: var(--gold);
        }
        .page-hero__eyebrow::before,
        .page-hero__eyebrow::after {
            content: '';
            width: 26px; height: 1px;
            background: var(--gold);
            opacity: 0.5;
        }
        .page-hero__meta {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--ink-2);
        }
        .page-hero__meta .dot {
            width: 3px; height: 3px;
            border-radius: 50%;
            background: var(--gold);
        }

        /* Filter tabs */
        .filters {
            position: sticky;
            top: 0;
            z-index: 60;
            display: flex;
            justify-content: center;
            gap: var(--s-2);
            padding: var(--s-4) var(--inline-pad);
            background: linear-gradient(180deg, var(--bg-0) 72%, transparent 100%);
        }
        .filter-tab {
            min-height: 44px;
            padding: 10px 26px;
            border-radius: var(--r-pill);
            border: 1.5px solid var(--line);
            font-size: 0.74rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink-2);
            transition: all var(--t-base);
        }
        .filter-tab:hover { border-color: var(--gold); color: var(--gold); }
        .filter-tab[aria-pressed="true"] {
            background: var(--gold);
            border-color: var(--gold);
            color: var(--bg-0);
        }

        /* Masonry */
        .gallery-wrap {
            max-width: 1400px;
            margin-inline: auto;
            padding: var(--s-2) var(--s-2) calc(var(--s-10) + 40px);
        }
        .masonry {
            columns: 2;
            column-gap: 6px;
        }
        @media (min-width: 768px)  { .masonry { columns: 3; column-gap: 8px; } }
        .masonry-item {
            position: relative;
            break-inside: avoid;
            margin-bottom: 6px;
            border-radius: 6px;
            overflow: hidden;
            cursor: zoom-in;
            padding: 0;
            display: block;
            width: 100%;
            background: var(--bg-2);
        }
        @media (min-width: 768px) { .masonry-item { margin-bottom: 8px; } }
        .masonry-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s var(--ease);
        }
        .masonry-item::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 60%, rgba(10, 10, 11, 0.35) 100%);
            opacity: 0;
            transition: opacity var(--t-base);
            pointer-events: none;
        }
        .masonry-item:hover img { transform: scale(1.03); }
        .masonry-item:hover::after { opacity: 1; }

        /* Group headers */
        .group-head {
            display: flex;
            align-items: center;
            gap: var(--s-4);
            padding: var(--s-7) var(--s-2) var(--s-4);
        }
        .group-head:first-child { padding-top: var(--s-3); }
        .group-head h2 {
            font-size: 1.35rem;
            white-space: nowrap;
        }
        .group-head .count {
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--gold);
            white-space: nowrap;
        }
        .group-head .line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--gold-30), transparent);
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(5, 5, 6, 0.96);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.35s ease, visibility 0.35s ease;
        }
        .lightbox.active { opacity: 1; visibility: visible; }
        .lightbox img {
            max-width: 92vw;
            max-height: 86vh;
            width: auto; height: auto;
            object-fit: contain;
            border-radius: 6px;
            box-shadow: var(--shadow-2);
            transition: opacity 0.25s ease;
        }
        .lightbox__btn {
            position: absolute;
            width: 48px; height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 1.5px solid var(--line-gold);
            background: rgba(14, 14, 16, 0.6);
            backdrop-filter: blur(10px);
            color: var(--gold);
            transition: all var(--t-base);
            z-index: 10;
        }
        .lightbox__btn:hover {
            background: var(--gold);
            border-color: var(--gold);
            color: var(--bg-0);
        }
        .lightbox__btn svg.icon { width: 20px; height: 20px; }
        .lightbox__close { top: 16px; right: 16px; }
        .lightbox__prev { left: 14px; top: 50%; transform: translateY(-50%); }
        .lightbox__next { right: 14px; top: 50%; transform: translateY(-50%); }
        .lightbox__counter {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            color: var(--ink-2);
            background: rgba(14, 14, 16, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid var(--line);
            padding: 8px 20px;
            border-radius: var(--r-pill);
        }
        @media (max-width: 640px) {
            .lightbox__prev { left: 8px; }
            .lightbox__next { right: 8px; }
            .lightbox__btn { width: 44px; height: 44px; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="site-header">
        <div class="site-header__inner">
            <a href="index.html" class="brand" aria-label="Camper Van Gogh — Home">
                <img src="Logo/logo-96.png" alt="" width="96" height="97">
                <span class="brand__name">Camper Van Gogh</span>
            </a>
            <button class="nav-toggle" aria-expanded="false" aria-controls="site-nav" aria-label="Menu">
                <svg class="icon icon-burger" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
                <svg class="icon icon-close" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
            </button>
            <nav class="site-nav" id="site-nav" aria-label="Main">
                <a class="site-nav__link" href="index.html">Home</a>
                <a class="site-nav__link" href="index.html#features">The Van</a>
                <a class="site-nav__link" href="gallery.html" aria-current="page">Gallery</a>
                <a class="site-nav__link" href="index.html#pricing">Rates</a>
                <a class="site-nav__link" href="index.html#contact">Contact</a>
                <a class="btn btn--gold" href="booking.html">Book Now</a>
            </nav>
        </div>
    </header>

    <!-- PAGE HERO -->
    <section class="page-hero">
        <div class="page-hero__inner">
            <p class="page-hero__eyebrow reveal active">Collection</p>
            <h1 class="reveal active">Gallery</h1>
            <p class="page-hero__meta reveal active">
                <span>Interior</span>
                <span class="dot" aria-hidden="true"></span>
                <span>Exterior</span>
                <span class="dot" aria-hidden="true"></span>
                <span><span id="photo-count">63</span> Pieces</span>
            </p>
        </div>
    </section>

    <!-- FILTERS -->
    <div class="filters" role="group" aria-label="Filter photos">
        <button class="filter-tab" data-filter="all" aria-pressed="true">All</button>
        <button class="filter-tab" data-filter="interior" aria-pressed="false">Interior</button>
        <button class="filter-tab" data-filter="exterior" aria-pressed="false">Exterior</button>
    </div>

    <!-- GALLERY -->
    <main class="gallery-wrap" id="photo-gallery"></main>

    <!-- LIGHTBOX -->
    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
        <button class="lightbox__btn lightbox__close" id="lightbox-close" aria-label="Close">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
        <button class="lightbox__btn lightbox__prev" id="lightbox-prev" aria-label="Previous image">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <img id="lightbox-img" src="" alt="">
        <button class="lightbox__btn lightbox__next" id="lightbox-next" aria-label="Next image">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 6l6 6-6 6"/></svg>
        </button>
        <div class="lightbox__counter" id="lightbox-counter">1 of 63</div>
    </div>

    <!-- MOBILE STICKY CTA -->
    <div class="cta-bar">
        <div class="cta-bar__price">From <strong>£130/day</strong></div>
        <a href="booking.html" class="btn btn--gold">Book Now</a>
    </div>

    <script>
    (function () {
        'use strict';

        /* Photo manifest: [stem, width, height] of the 800px variants.
           Thumbs load <stem>-800.webp/.jpg, lightbox loads <stem>-1600.webp. */
        var INTERIOR = [
            ['campervan-01',800,600],['campervan-02',800,600],['campervan-03',800,600],
            ['campervan-04',800,600],['campervan-05',800,600],['campervan-06',800,600],
            ['campervan-07',800,600],['campervan-08',800,600],['campervan-09',800,600],
            ['campervan-10',800,600],['campervan-11',800,600],['campervan-12',800,600]
        ];
        var EXTERIOR = [
            ['campervan-01',800,600],['campervan-02',800,600],['campervan-03',600,800],
            ['campervan-04',800,600],['campervan-05',800,600],['campervan-06',800,600],
            ['campervan-07',800,600],['campervan-08',800,600],['campervan-09',800,600],
            ['campervan-10',800,600],['campervan-12',800,600],['campervan-13',800,600],
            ['campervan-14',800,600],['campervan-15',800,600],['campervan-17',800,600],
            ['campervan-18',800,600],['campervan-21',800,600],['campervan-22',800,600],
            ['campervan-23',800,600],
            ['scotland-01',800,576],['scotland-02',800,600],['scotland-03',800,600],
            ['scotland-04',800,615],['scotland-05',800,600],['scotland-06',600,800],
            ['scotland-07',800,600],['scotland-09',800,600],['scotland-10',800,600],
            ['scotland-11',800,600],['scotland-12',800,600],['scotland-13',800,600],
            ['scotland-14',800,600],['scotland-15',800,600],['scotland-16',800,600],
            ['scotland-17',800,600],['scotland-18',800,600],['scotland-19',800,600],
            ['scotland-20',800,600],['scotland-21',800,600],['scotland-22',800,600],
            ['scotland-23',800,600],['scotland-24',800,600],['scotland-25',800,600],
            ['scotland-26',800,600],['scotland-27',800,600],['scotland-28',800,600],
            ['scotland-29',800,600],['scotland-30',800,600],['scotland-33',800,600],
            ['scotland-34',800,600],['scotland-35',800,600]
        ];

        var container = document.getElementById('photo-gallery');
        var lightbox = document.getElementById('lightbox');
        var lightboxImg = document.getElementById('lightbox-img');
        var counter = document.getElementById('lightbox-counter');
        var visible = [];
        var current = 0;
        var lastFocus = null;

        function altText(group, stem, i) {
            if (group === 'interior') return 'Vincent VW T6.1 campervan interior — handcrafted conversion, view ' + (i + 1);
            return stem.indexOf('scotland-') === 0
                ? 'Vincent VW T6.1 campervan on a Scotland road trip, view ' + (i + 1)
                : 'Vincent VW T6.1 campervan exterior, Hampshire UK, view ' + (i + 1);
        }

        function buildGrid(photos, group) {
            var grid = document.createElement('div');
            grid.className = 'masonry';
            photos.forEach(function (p, i) {
                var stem = p[0], w = p[1], h = p[2];
                var base = 'gallery/' + group + '/' + stem;
                var idx = visible.length;
                visible.push({ full: base + '-1600.webp', alt: altText(group, stem, i) });

                var item = document.createElement('button');
                item.type = 'button';
                item.className = 'masonry-item';
                item.setAttribute('aria-label', 'Open photo: ' + altText(group, stem, i));
                item.innerHTML =
                    '<picture>' +
                    '<source type="image/webp" srcset="' + base + '-800.webp">' +
                    '<img src="' + base + '-800.jpg" width="' + w + '" height="' + h + '" alt="' + altText(group, stem, i) + '" loading="lazy" decoding="async">' +
                    '</picture>';
                item.addEventListener('click', function () { openLightbox(idx); });
                grid.appendChild(item);
            });
            return grid;
        }

        function groupHead(title, count) {
            var el = document.createElement('div');
            el.className = 'group-head';
            el.innerHTML = '<h2>' + title + '</h2><span class="count">' + count + ' photos</span><div class="line" aria-hidden="true"></div>';
            return el;
        }

        function render(filter) {
            container.innerHTML = '';
            visible = [];
            if (filter === 'all' || filter === 'interior') {
                if (filter === 'all') container.appendChild(groupHead('Interior', INTERIOR.length));
                container.appendChild(buildGrid(INTERIOR, 'interior'));
            }
            if (filter === 'all' || filter === 'exterior') {
                if (filter === 'all') container.appendChild(groupHead('Exterior', EXTERIOR.length));
                container.appendChild(buildGrid(EXTERIOR, 'exterior'));
            }
        }

        /* Filters */
        document.querySelectorAll('.filter-tab').forEach(function (tab) {
            tab.addEventListener('click', function () {
                document.querySelectorAll('.filter-tab').forEach(function (t) { t.setAttribute('aria-pressed', 'false'); });
                tab.setAttribute('aria-pressed', 'true');
                render(tab.dataset.filter);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });

        /* Lightbox */
        function openLightbox(i) {
            current = i;
            lastFocus = document.activeElement;
            update();
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
            document.getElementById('lightbox-close').focus();
        }
        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
            if (lastFocus) lastFocus.focus();
        }
        function update() {
            lightboxImg.style.opacity = '0';
            var item = visible[current];
            var pre = new Image();
            pre.onload = function () {
                lightboxImg.src = item.full;
                lightboxImg.alt = item.alt;
                lightboxImg.style.opacity = '1';
            };
            pre.src = item.full;
            counter.textContent = (current + 1) + ' of ' + visible.length;
        }
        function next() { current = (current + 1) % visible.length; update(); }
        function prev() { current = (current - 1 + visible.length) % visible.length; update(); }

        document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
        document.getElementById('lightbox-next').addEventListener('click', next);
        document.getElementById('lightbox-prev').addEventListener('click', prev);
        lightbox.addEventListener('click', function (e) { if (e.target === lightbox) closeLightbox(); });

        document.addEventListener('keydown', function (e) {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') next();
            if (e.key === 'ArrowLeft') prev();
        });

        /* Swipe */
        var touchX = 0;
        lightbox.addEventListener('touchstart', function (e) { touchX = e.changedTouches[0].screenX; }, { passive: true });
        lightbox.addEventListener('touchend', function (e) {
            var diff = touchX - e.changedTouches[0].screenX;
            if (Math.abs(diff) > 50) { diff > 0 ? next() : prev(); }
        }, { passive: true });

        /* Init */
        document.getElementById('photo-count').textContent = INTERIOR.length + EXTERIOR.length;
        render('all');
    })();
    </script>

    <script src="main.js" defer></script>
    <script src="whatsapp-widget.js" defer></script>
</body>
</html>
