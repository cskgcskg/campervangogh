<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Photo Gallery</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500;600&family=Caveat:wght@400;700&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'paper': '#F2F0E9',      /* Bone / Art Paper */
                        'ink': '#121212',        /* Deep Black */
                        'pop': '#FF5733',        /* Vibrant Orange/Red Accent */
                        'canvas': '#E6E2D6',     /* Darker Paper */
                    },
                    fontFamily: {
                        'headline': ['"Anton"', 'sans-serif'],
                        'body': ['"Inter"', 'sans-serif'],
                        'hand': ['"Caveat"', 'cursive'],
                    },
                    spacing: {
                        '128': '32rem',
                    },
                    rotate: {
                        '3': '3deg',
                        '-3': '-3deg',
                    }
                }
            }
        }
    </script>
    <style>
        /* Ensures the background is clean and removes default browser margins */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F2F0E9;
            padding: 0;
            margin: 0;
            padding-bottom: 6rem;
            /* Space for the dock */
        }

        /* Filter tabs */
        .filter-tabs {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            padding: 1rem 0.5rem 0.75rem;
            position: sticky;
            top: 0;
            z-index: 30;
            background: linear-gradient(to bottom, #F2F0E9 80%, transparent);
        }
        .filter-tab {
            padding: 0.5rem 1.25rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            border: 2px solid #121212;
            background: transparent;
            color: #121212;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }
        .filter-tab:hover {
            background: #121212;
            color: #F2F0E9;
        }
        .filter-tab.active {
            background: #121212;
            color: #F2F0E9;
        }

        /* Masonry layout using CSS columns */
        .masonry-grid {
            columns: 2;
            column-gap: 4px;
            padding: 0;
        }
        @media (min-width: 640px) {
            .masonry-grid {
                column-gap: 8px;
            }
        }
        .masonry-item {
            break-inside: avoid;
            margin-bottom: 4px;
            border-radius: 0.375rem;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }
        @media (min-width: 640px) {
            .masonry-item {
                margin-bottom: 8px;
            }
        }
        .masonry-item img {
            width: 100%;
            display: block;
            transition: opacity 0.3s ease;
        }
        .masonry-item:hover img {
            opacity: 0.88;
        }

        /* Section headers */
        .section-header {
            break-before: column;
            break-inside: avoid;
            column-span: all;
            padding: 1.5rem 0.5rem 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .section-header h2 {
            font-family: 'Anton', sans-serif;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #121212;
            margin: 0;
        }
        .section-header .accent {
            font-family: 'Caveat', cursive;
            font-size: 1.1rem;
            color: #FF5733;
            transform: rotate(-2deg);
            display: inline-block;
        }
        .section-header .line {
            flex: 1;
            height: 2px;
            background: #121212;
            opacity: 0.15;
        }
    </style>
</head>

<body class="antialiased">

    <!-- Filter Tabs -->
    <div class="filter-tabs" id="filter-tabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="campervan">Campervan</button>
        <button class="filter-tab" data-filter="scotland">Scotland 2026</button>
    </div>

    <!-- Full Width Photo Gallery (Masonry layout — no cropping) -->
    <section id="photo-gallery" class="p-1 sm:p-2">
        <div class="masonry-grid">
            <!-- Images will be injected here by JavaScript -->
        </div>
    </section>

    <!-- Full-Screen Gallery Modal (Lightbox) - Essential for navigation functionality -->
    <div id="gallery-modal" class="fixed inset-0 bg-black bg-opacity-95 z-50 hidden transition-opacity duration-300">
        <div class="h-full w-full flex items-center justify-center relative">

            <!-- Close Button -->
            <button id="close-modal"
                class="absolute top-4 right-4 text-white p-2 rounded-full hover:bg-white/10 transition duration-150">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <!-- Previous Button -->
            <button id="prev-image"
                class="absolute left-4 p-3 bg-white/20 text-white rounded-full hover:bg-white/40 transition-all duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                </svg>
            </button>

            <!-- Current Image Container -->
            <div class="max-w-6xl max-h-full p-10">
                <img id="current-gallery-image" src="" alt="Campervan Photo"
                    class="max-h-[85vh] w-auto object-contain rounded-lg shadow-2xl">
            </div>

            <!-- Next Button -->
            <button id="next-image"
                class="absolute right-4 p-3 bg-white/20 text-white rounded-full hover:bg-white/40 transition-all duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                </svg>
            </button>

            <!-- Image Counter -->
            <div id="image-counter"
                class="absolute bottom-4 left-1/2 transform -translate-x-1/2 text-white bg-black/50 px-4 py-1 rounded-full text-sm font-medium">
                1 of 25
            </div>

        </div>
    </div>

    <!-- Bottom Navigation Bar (Dock Style) -->
    <nav
        class="fixed bottom-0 left-0 w-full z-40 px-4 pb-4 pt-4 bg-gradient-to-t from-paper via-paper to-transparent md:bg-none">
        <div
            class="max-w-4xl mx-auto bg-ink text-white rounded-full px-2 py-2 flex justify-between items-center shadow-2xl border border-gray-800">
            <!-- Nav Items -->
            <div class="flex gap-1">
                <a href="index.html"
                    class="px-5 py-3 rounded-full hover:bg-white/10 transition text-sm font-bold uppercase tracking-wider flex items-center gap-2">
                    <i class="fa-solid fa-home text-pop"></i> <span class="hidden sm:inline">Home</span>
                </a>
                <a href="index.html#specs"
                    class="px-5 py-3 rounded-full hover:bg-white/10 transition text-sm font-bold uppercase tracking-wider flex items-center gap-2">
                    <i class="fa-solid fa-list-ul text-pop"></i> <span class="hidden sm:inline">Specs</span>
                </a>
                <a href="gallery.html"
                    class="px-5 py-3 rounded-full hover:bg-white/10 transition text-sm font-bold uppercase tracking-wider flex items-center gap-2 bg-white/10">
                    <i class="fa-solid fa-camera text-pop"></i> <span class="hidden sm:inline">Photos</span>
                </a>
                <a href="index.html#rates"
                    class="px-5 py-3 rounded-full hover:bg-white/10 transition text-sm font-bold uppercase tracking-wider flex items-center gap-2">
                    <i class="fa-solid fa-tag text-pop"></i> <span class="hidden sm:inline">Rates</span>
                </a>
            </div>

            <!-- CTA -->
            <a href="booking.html"
                class="bg-white text-ink px-6 py-3 rounded-full font-bold uppercase text-sm hover:bg-pop hover:text-white transition shadow-lg transform hover:-translate-y-1">
                Book Now
            </a>
        </div>
    </nav>

    <!-- JavaScript for Gallery Functionality -->
    <script>
        const imageGallery = document.getElementById('photo-gallery').querySelector('div');
        const modal = document.getElementById('gallery-modal');
        const currentImage = document.getElementById('current-gallery-image');
        const imageCounter = document.getElementById('image-counter');
        const prevBtn = document.getElementById('prev-image');
        const nextBtn = document.getElementById('next-image');
        let currentImageIndex = 0;

        // Base URL prefix for Cloudinary images
        const CLOUDINARY_BASE = 'https://res.cloudinary.com/hqxyevlf6/image/upload/f_auto,q_auto/';

        // 25 UNIQUE Cloudinary Image Identifiers (Campervan photos)
        const campervanImageIds = [
            'ayjr1cqkmhumsmsaqkpr.jpg', 'vymhy8v9wbox8t9ludyy.jpg', 'ce2qm9hxq9v4eazoptfr.jpg',
            'o7nioxeup4iocpmai2dv.jpg', 'uwl6c0um558crscxpsw5.jpg', 'ge39omnrfj2z84smc4qe.jpg',
            'hrg8thrw5uzutywrndf4.jpg', 'ucdsd1ejdxzcou34jlwa.jpg', 'w1fvkszzmqooa7v1gagh.jpg',
            'ijxgcpi6axmrahkq1uv3.jpg', 'ivsgbhzhct8hrw1e1ufh.jpg', 'bsme416uqmdijifl0vss.jpg',
            'tvtojdnj3kclqrteqmxa.jpg', 'lxduli1ejaxwfh55kfaz.jpg', 'lmdhry3owynkijb1vq6f.jpg',
            'qetnppfotp6i1k3k8e8v.jpg', 'yeuzrn3hfwrvsjhjdoi7.jpg', 'kyfljzdufcigmwd31lqk.jpg',
            'c46qpbwnk4wda1yxy3my.jpg', 'jhjg8ryvwkr7skkvua7m.jpg', 'wvebuvwe28ln58glwqlm.jpg',
            'wv2t9minixnlhmiu7k9q.jpg', 'ntpv4sbvwkdknli7ygcn.jpg', 'ml2nkibfpdyc6vy9lbbr.jpg',
            'ytxagfwalldrpqk3iren.jpg'
        ];

        // Cloudinary full URLs
        const campervanUrls = campervanImageIds.map(id => CLOUDINARY_BASE + id);

        // Scotland 2026 local photos (web-optimised JPEGs)
        const scotlandFilenames = [
            'IMG_4989.jpeg', 'IMG_5129.jpeg', 'IMG_5180.jpeg', 'IMG_5193.jpeg',
            'IMG_5199.jpeg', 'IMG_5208.jpeg', 'IMG_5237.jpeg', 'IMG_5264.jpeg',
            'IMG_5268.jpeg', 'IMG_5280.jpeg', 'IMG_5336.jpeg', 'IMG_5339.jpeg',
            'IMG_5374.jpeg', 'IMG_5396.jpeg', 'IMG_5470.jpeg', 'IMG_5535.jpeg',
            'IMG_5620.jpeg', 'IMG_5661.jpeg', 'IMG_5702.jpeg', 'IMG_5706.jpeg',
            'IMG_5728.jpeg', 'IMG_5814.jpeg', 'IMG_7653.jpeg', 'IMG_7720.jpeg',
            'IMG_7722.jpeg', 'IMG_7730.jpeg', 'IMG_7731.jpeg', 'IMG_7768.jpeg',
            'IMG_7771.jpeg', 'IMG_7772.jpeg', 'IMG_7840.jpeg',
            'IMG_7859.jpeg', 'IMG_7890.jpeg', 'IMG_7893.jpeg'
        ];
        const scotlandBase = 'photos%20Scotland%202026/web/';
        const scotlandUrls = scotlandFilenames.map(f => scotlandBase + f);

        // Current filter state and visible image list for lightbox
        let activeFilter = 'all';
        let visibleImageUrls = [];

        // Build the unified image list based on current filter
        function getFilteredImages() {
            if (activeFilter === 'campervan') return { urls: [...campervanUrls], sections: ['campervan'] };
            if (activeFilter === 'scotland') return { urls: [...scotlandUrls], sections: ['scotland'] };
            return { urls: [...campervanUrls, ...scotlandUrls], sections: ['campervan', 'scotland'] };
        }

        // Get a thumbnail URL — Cloudinary images use c_limit to scale down without cropping
        function getThumbnailUrl(url) {
            if (url.startsWith('https://res.cloudinary.com')) {
                return url.replace('/f_auto,q_auto/', '/c_limit,f_auto,w_800,q_auto/');
            }
            return url; // local images are already web-optimised
        }

        // Create section header element
        function createSectionHeader(title, accent) {
            const header = document.createElement('div');
            header.className = 'section-header';
            header.innerHTML = `
                <h2>${title}</h2>
                <span class="accent">${accent}</span>
                <div class="line"></div>
            `;
            return header;
        }

        // Function to create the masonry gallery
        function initializeGallery() {
            imageGallery.innerHTML = '';
            const { urls, sections } = getFilteredImages();
            visibleImageUrls = urls;

            let globalIndex = 0;

            if (activeFilter === 'all' || activeFilter === 'campervan') {
                if (activeFilter === 'all') {
                    imageGallery.appendChild(createSectionHeader('The Campervan', '25 photos'));
                }
                campervanUrls.forEach((url) => {
                    const idx = globalIndex++;
                    const imgContainer = document.createElement('div');
                    imgContainer.className = 'masonry-item';
                    const thumbnailUrl = getThumbnailUrl(url);
                    imgContainer.innerHTML = `
                        <img src="${thumbnailUrl}" 
                             alt="Campervan Photo ${idx + 1}" 
                             loading="lazy"
                             data-index="${idx}"
                             onerror="this.src='https://placehold.co/600x400/e0e7ff/4338ca?text=Photo'; this.onerror=null;">
                    `;
                    imgContainer.addEventListener('click', () => openGallery(idx));
                    imageGallery.appendChild(imgContainer);
                });
            }

            if (activeFilter === 'all' || activeFilter === 'scotland') {
                if (activeFilter === 'all') {
                    imageGallery.appendChild(createSectionHeader('Scotland 2026', '34 photos'));
                }
                scotlandUrls.forEach((url) => {
                    const idx = globalIndex++;
                    const imgContainer = document.createElement('div');
                    imgContainer.className = 'masonry-item';
                    imgContainer.innerHTML = `
                        <img src="${url}" 
                             alt="Scotland 2026 Photo ${idx + 1}" 
                             loading="lazy"
                             data-index="${idx}"
                             onerror="this.src='https://placehold.co/600x400/e0e7ff/4338ca?text=Photo'; this.onerror=null;">
                    `;
                    imgContainer.addEventListener('click', () => openGallery(idx));
                    imageGallery.appendChild(imgContainer);
                });
            }
        }

        // Filter tab click handling
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                activeFilter = tab.dataset.filter;
                initializeGallery();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });

        // Function to open the modal
        function openGallery(index) {
            currentImageIndex = index;
            updateModalImage();
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        // Function to close the modal
        function closeModal() {
            modal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Function to update the image in the modal
        function updateModalImage() {
            const url = visibleImageUrls[currentImageIndex];
            currentImage.src = url;
            imageCounter.textContent = `${currentImageIndex + 1} of ${visibleImageUrls.length}`;
        }

        // Navigation handlers
        function showNextImage() {
            currentImageIndex = (currentImageIndex + 1) % visibleImageUrls.length;
            updateModalImage();
        }

        function showPrevImage() {
            currentImageIndex = (currentImageIndex - 1 + visibleImageUrls.length) % visibleImageUrls.length;
            updateModalImage();
        }

        // Event listeners for navigation
        prevBtn.addEventListener('click', showPrevImage);
        nextBtn.addEventListener('click', showNextImage);
        document.getElementById('close-modal').addEventListener('click', closeModal);

        // Keyboard navigation (Escape key to close, Arrows to navigate)
        document.addEventListener('keydown', (e) => {
            if (modal.classList.contains('hidden')) return;

            if (e.key === 'Escape') {
                closeModal();
            } else if (e.key === 'ArrowRight') {
                showNextImage();
            } else if (e.key === 'ArrowLeft') {
                showPrevImage();
            }
        });

        // Initialize the gallery when the page loads
        document.addEventListener('DOMContentLoaded', initializeGallery);
    </script>

    <script src="whatsapp-widget.js"></script>
</body>

</html>
